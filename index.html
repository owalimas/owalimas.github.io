<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/jquery.min.js"> </script>
    <script src="./js/login.js"> </script>
    <title>登录界面</title>
    <style>
        body {
            background: url(./img/loginBackground.png) center top no-repeat;
        }

        .form-signin input,
        .btn {
            max-width: 50%;        
            height: 100%
        }
    </style>
</head>

<body>

    <div class="container center-block">
        <form class="form-signin" action="html/main.html" method="GET">
            <h3 class="form-signin-heading text-center">Login</h3>
            </br>

            <input type="text" id="inputName" class="form-control center-block" placeholder="username" name="Username">
            </br>
        
            <input type="password" id="inputPassword" class="form-control  center-block" placeholder="password"
                name="Password">
            </br>
            <button id="login" class="btn btn-lg btn-primary btn-block  center-block" type="submit">登录</button>
        </form>

    </div> <!-- /container -->
    <!-- 导入支持bootstrap的js库 -->

</body>
<script>
</script>

</html>
